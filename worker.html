<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👷 Worker Dashboard | Urban Issues</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/dashboard.css">
    <style>
        .report-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }
        .report-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .report-body {
            padding: 1.5rem;
        }
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .report-type {
            font-size: 1.25rem;
            font-weight: 700;
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .status-assigned { background: #dbeafe; color: #1e40af; }
        .status-completed { background: #dcfce7; color: #166534; }
        .action-row {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: flex-end;
        }
        .action-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-complete {
            background: #10b981;
            color: white;
        }
        .btn-complete:hover {
            background: #059669;
        }
        .btn-complete:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="dashboard-header">
        <div class="header-content">
            <div class="header-title">
                <i class="fas fa-hard-hat"></i>
                Worker Dashboard
            </div>
            <div class="user-section">
                <div class="user-badge">
                    <i class="fas fa-user-circle"></i>
                    <span id="username-display">Loading...</span>
                </div>
                <button class="logout-btn" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div class="dashboard-container">
        <div class="reports-section">
            <div class="section-header" style="margin-bottom: 1.5rem;">
                <div class="section-title">
                    <i class="fas fa-clipboard-list"></i>
                    My Assigned Tasks
                </div>
            </div>

            <div id="loading-container" style="text-align: center; padding: 3rem;">
                <div class="loading-spinner"></div>
                <p style="margin-top: 1rem; color: #6b7280;">Loading your tasks...</p>
            </div>

            <div id="reports-container" class="reports-grid" style="display: none; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem;"></div>

            <div id="empty-state" class="empty-state" style="display: none; text-align: center; padding: 4rem;">
                <div style="font-size: 4rem; color: #d1d5db; margin-bottom: 1rem;"><i class="fas fa-check-circle"></i></div>
                <div style="font-size: 1.25rem; font-weight: 600;">No Assigned Tasks</div>
                <div style="color: #6b7280;">You currently have no tasks assigned to you.</div>
            </div>
        </div>
    </div>

    <script>
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/me');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('username-display').textContent = data.username;

                    if (data.role !== 'worker') {
                        window.location.href = '/';
                    }
                } else {
                    window.location.href = '/login';
                }
            } catch (error) {
                window.location.href = '/login';
            }
        }

        async function loadReports() {
            try {
                const response = await fetch('/api/reports');
                const reports = await response.json();
                displayReports(reports);
            } catch (error) {
                console.error('Error loading reports:', error);
            }
        }

        function displayReports(reports) {
            const container = document.getElementById('reports-container');
            const loading = document.getElementById('loading-container');
            const emptyState = document.getElementById('empty-state');

            loading.style.display = 'none';

            if (reports.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            container.style.display = 'grid';
            emptyState.style.display = 'none';

            container.innerHTML = reports.map(report => `
                <div class="report-card">
                    <img src="${report.image_url}" alt="${report.issue_type}" class="report-image">
                    <div class="report-body">
                        <div class="report-header">
                            <div class="report-type">${report.issue_type}</div>
                            <span class="status-badge status-${report.status.toLowerCase()}">${report.status}</span>
                        </div>
                        <p style="color: #4b5563; margin-bottom: 1rem;">${report.description}</p>
                        
                        <div style="font-size: 0.875rem; color: #6b7280; margin-bottom: 0.5rem;">
                            <i class="fas fa-map-marker-alt"></i> Location: ${report.latitude.toFixed(4)}, ${report.longitude.toFixed(4)}
                        </div>
                        <div style="font-size: 0.875rem; color: #6b7280;">
                            <i class="fas fa-calendar-alt"></i> Assigned on: ${new Date(report.created_at).toLocaleDateString()}
                        </div>

                        <div class="action-row">
                            <button class="action-btn btn-complete" onclick="markCompleted('${report._id}')" ${report.status === 'Completed' ? 'disabled' : ''}>
                                <i class="fas fa-check-double"></i> ${report.status === 'Completed' ? 'Completed' : 'Mark as Completed'}
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function markCompleted(reportId) {
            try {
                const response = await fetch(`/api/reports/${reportId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'Completed' })
                });

                if (response.ok) {
                    loadReports();
                } else {
                    alert('Failed to update status');
                }
            } catch (error) {
                console.error('Update error:', error);
                alert('Connection error');
            }
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            window.location.href = '/api/auth/logout';
        });

        checkAuth();
        loadReports();
    </script>
</body>

</html>
